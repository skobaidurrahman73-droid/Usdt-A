<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BDT Secure Wallet Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');
        body { font-family: 'Outfit', sans-serif; background: #050505; color: white; margin: 0; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 28px; }
        .gradient-cyan { background: linear-gradient(135deg, #22d3ee, #0ea5e9); }
        
        /* VIP Agent Styles */
        .agent-vip .glass { background: rgba(234, 179, 8, 0.03) !important; border: 1px solid rgba(234, 179, 8, 0.15) !important; }
        .agent-vip .text-cyan-400 { color: #eab308 !important; }
        .agent-vip .border-cyan-500 { border-color: #eab308 !important; }
        .agent-vip .border-cyan-500\/20 { border-color: rgba(234, 179, 8, 0.2) !important; }
        .agent-vip .gradient-cyan { background: linear-gradient(135deg, #fef08a, #eab308) !important; color: #000 !important; }
        .agent-vip .bg-cyan-500\/10 { background-color: rgba(234, 179, 8, 0.1) !important; }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
        input { background: rgba(0,0,0,0.5) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; outline: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div id="authSection" class="max-w-md mx-auto h-screen flex flex-col justify-center px-6">
        <div class="glass p-8 text-center border-t border-cyan-500/20 shadow-2xl">
            <h1 id="authLogo" class="text-3xl font-black mb-8 text-cyan-400 tracking-tighter uppercase italic">BDT Node</h1>
            
            <!-- নাম ইনপুট করার নতুন ঘর (শুধুমাত্র রেজিস্ট্রেশনের সময় দেখাবে) -->
            <input type="text" id="userName" placeholder="Full Name (For Signup Only)" class="w-full p-4 rounded-2xl mb-4 text-sm">
            
            <input type="email" id="email" placeholder="Email Address" class="w-full p-4 rounded-2xl mb-4 text-sm">
            <input type="password" id="password" placeholder="6-Digit PIN/Password" maxlength="6" class="w-full p-4 rounded-2xl mb-8 text-sm text-center tracking-widest">
            <div class="flex gap-4">
                <button onclick="handleAuth('login')" class="flex-1 gradient-cyan text-black font-black py-4 rounded-2xl uppercase text-[11px]">Login</button>
                <button onclick="handleAuth('signup')" class="flex-1 border border-white/10 py-4 rounded-2xl font-bold uppercase text-[11px]">Join Now</button>
            </div>
        </div>
    </div>

    <div id="mainApp" class="max-w-md mx-auto pb-32 px-5 hidden">
        <div class="flex justify-between items-center py-8">
            <div class="text-white font-bold text-xs">
                <p class="text-gray-400 text-[11px] mb-0.5">Welcome, <span id="displayUserName" class="text-white font-black">---</span></p>
                <h2><span id="roleBadge" class="hidden mr-1 text-[9px] px-2 py-0.5 rounded font-black uppercase bg-yellow-500/20 text-yellow-400">VIP AGENT</span> UID: <span id="uId" class="text-cyan-400">---</span></h2>
            </div>
            <button onclick="auth.signOut()" class="text-red-500 text-[10px] font-black border border-red-500/20 px-4 py-2 rounded-xl">Logout</button>
        </div>

        <div class="glass p-8 text-center mb-8 relative border-t border-white/10">
            <p id="balLabel" class="text-gray-500 text-[10px] font-black uppercase mb-2">Total Balance</p>
            <div class="flex items-center justify-center gap-2 mb-8">
                <i id="walletIcon" class="fas fa-wallet text-cyan-400 text-2xl"></i>
                <h1 id="mainBal" class="text-5xl font-black tracking-tighter">0.00</h1>
                <span class="text-xl text-white/40">BDT</span>
            </div>
            
            <!-- User Buttons -->
            <div id="userGrid" class="grid grid-cols-3 gap-2">
                <button onclick="openModal('sendMoneyModal')" class="bg-cyan-500/10 border border-cyan-500/20 py-4 rounded-2xl font-black text-xs text-cyan-400">Send Money</button>
                <button onclick="openModal('cashOutModal')" class="bg-red-500/10 border border-red-500/20 py-4 rounded-2xl font-black text-xs text-red-400">Cash Out</button>
                <button onclick="openHistory()" class="bg-white/5 border border-white/10 py-4 rounded-2xl font-black text-xs text-gray-300">History</button>
            </div>

            <!-- Agent Buttons -->
            <div id="agentGrid" class="grid grid-cols-3 gap-2 hidden">
                <button onclick="openModal('cashInModal')" class="bg-yellow-500/10 border border-yellow-500/20 py-4 rounded-2xl font-black text-xs text-yellow-400">Cash In</button>
                <button onclick="openModal('cashTransferModal')" class="bg-orange-500/10 border border-orange-500/20 py-4 rounded-2xl font-black text-xs text-orange-400">Transfer</button>
                <button onclick="openHistory()" class="bg-white/5 border border-white/10 py-4 rounded-2xl font-black text-xs text-gray-300">History</button>
            </div>
        </div>

        <div class="mt-12 p-6 glass text-center">
            <p class="text-cyan-400 text-[10px] font-black uppercase mb-2">Emergency Support</p>
            <a href="mailto:fafod33233@tokoub.com" class="text-white text-xs font-mono underline block mb-3">fafod33233@tokoub.com</a>
            <p class="text-[8px] text-gray-500 uppercase leading-relaxed font-bold">Please include your UID and Email when contacting support.</p>
        </div>
    </div>

    <!-- Modals Section -->
    <div id="sendMoneyModal" class="modal">
        <div class="glass p-8 w-full max-w-sm border-t-4 border-cyan-500">
            <h2 class="text-xl font-black mb-6 text-center text-cyan-400 uppercase italic">Send Money</h2>
            <input type="text" id="smFriendUid" placeholder="Recipient UID" class="w-full p-4 rounded-xl mb-3 text-xs uppercase">
            <input type="number" id="smAmount" placeholder="Amount BDT" class="w-full p-4 rounded-xl mb-3 text-xs">
            <input type="password" id="smPass" placeholder="6-Digit PIN" maxlength="6" class="w-full p-4 rounded-xl mb-6 text-xs text-center tracking-widest">
            <div class="flex gap-3">
                <button onclick="closeModal('sendMoneyModal')" class="flex-1 bg-white/5 py-4 rounded-xl text-[10px] font-bold uppercase">Cancel</button>
                <button onclick="submitTransfer()" class="flex-1 gradient-cyan text-black font-black py-4 rounded-xl text-[10px] uppercase">Send Now</button>
            </div>
        </div>
    </div>

    <div id="cashOutModal" class="modal">
        <div class="glass p-8 w-full max-w-sm border-t-4 border-red-500">
            <h2 class="text-xl font-black mb-6 text-center text-red-400 uppercase italic">Cash Out</h2>
            <input type="text" id="coAgentUid" placeholder="Agent UID" class="w-full p-4 rounded-xl mb-3 text-xs uppercase">
            <input type="number" id="coAmount" oninput="calculateCashOut()" placeholder="Amount BDT" class="w-full p-4 rounded-xl mb-3 text-xs">
            
            <div id="coLiveDetails" class="bg-black/40 border border-white/5 p-4 rounded-xl mb-4 text-[11px] space-y-1.5 font-bold hidden">
                <div class="flex justify-between"><span>টাকার পরিমান:</span> <span id="coLiveAmt" class="text-white">0.00</span></div>
                <div class="flex justify-between text-red-400"><span>ফি (১%):</span> <span id="coLiveFee">0.00</span></div>
                <div class="flex justify-between text-cyan-400"><span>মোট কাটবে:</span> <span id="coLiveTotal">0.00</span></div>
            </div>

            <input type="password" id="coPass" placeholder="6-Digit PIN" maxlength="6" class="w-full p-4 rounded-xl mb-6 text-xs text-center tracking-widest">
            <div class="flex gap-3">
                <button onclick="closeModal('cashOutModal')" class="flex-1 bg-white/5 py-4 rounded-xl text-[10px] font-bold uppercase">Cancel</button>
                <button onclick="submitCashOut()" class="flex-1 bg-red-500 text-white font-black py-4 rounded-xl text-[10px] uppercase">Cash Out</button>
            </div>
        </div>
    </div>

    <div id="cashInModal" class="modal">
        <div class="glass p-8 w-full max-w-sm border-t-4 border-yellow-500">
            <h2 class="text-xl font-black mb-6 text-center text-yellow-400 uppercase italic">Cash In</h2>
            <input type="text" id="ciUserUid" placeholder="User UID" class="w-full p-4 rounded-xl mb-3 text-xs uppercase">
            <input type="number" id="ciAmount" placeholder="Amount BDT" class="w-full p-4 rounded-xl mb-3 text-xs">
            <input type="password" id="ciPass" placeholder="6-Digit PIN" maxlength="6" class="w-full p-4 rounded-xl mb-6 text-xs text-center tracking-widest">
            <div class="flex gap-3">
                <button onclick="closeModal('cashInModal')" class="flex-1 bg-white/5 py-4 rounded-xl text-[10px] font-bold uppercase">Cancel</button>
                <button onclick="submitCashIn()" class="flex-1 gradient-cyan text-black font-black py-4 rounded-xl text-[10px] uppercase">Cash In Now</button>
            </div>
        </div>
    </div>

    <div id="cashTransferModal" class="modal">
        <div class="glass p-8 w-full max-w-sm border-t-4 border-orange-500">
            <h2 class="text-xl font-black mb-6 text-center text-orange-400 uppercase italic">Agent Transfer</h2>
            <input type="text" id="ctAgentUid" placeholder="Recipient Agent UID" class="w-full p-4 rounded-xl mb-3 text-xs uppercase">
            <input type="number" id="ctAmount" placeholder="Amount BDT" class="w-full p-4 rounded-xl mb-3 text-xs">
            <input type="password" id="ctPass" placeholder="6-Digit PIN" maxlength="6" class="w-full p-4 rounded-xl mb-6 text-xs text-center tracking-widest">
            <div class="flex gap-3">
                <button onclick="closeModal('cashTransferModal')" class="flex-1 bg-white/5 py-4 rounded-xl text-[10px] font-bold uppercase">Cancel</button>
                <button onclick="submitAgentTransfer()" class="flex-1 gradient-cyan text-black font-black py-4 rounded-xl text-[10px] uppercase">Transfer Now</button>
            </div>
        </div>
    </div>

    <div id="historyModal" class="modal">
        <div class="glass p-6 w-full max-w-sm">
            <h2 class="text-lg font-black mb-4 text-center text-cyan-400 uppercase tracking-wider">Statement</h2>
            <div id="historyList" class="space-y-3 max-h-[60vh] overflow-y-auto no-scrollbar pr-1"></div>
            <button onclick="closeModal('historyModal')" class="w-full mt-4 text-gray-400 font-black uppercase text-[11px] py-3 bg-white/5 rounded-xl hover:bg-white/10 transition">Close</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBIM8Rp8REYjdPHZegCYBF5ikW6Xdcqeg4", 
            authDomain: "usdt-72320.firebaseapp.com",
            databaseURL: "https://usdt-72320-default-rtdb.firebaseio.com",
            projectId: "usdt-72320",
            storageBucket: "usdt-72320.firebasestorage.app",
            messagingSenderId: "7688156181",
            appId: "1:7688156181:web:85ae9e18021d149627ca1c",
            measurementId: "G-VRS9ZTF6ZY"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();
        let userData = null;

        function handleAuth(type) {
            const name = document.getElementById('userName').value.trim();
            const e = document.getElementById('email').value.trim().toLowerCase();
            const p = document.getElementById('password').value.trim();
            
            if(!e || !p) return alert("Please fill Email and PIN!");
            if(p.length !== 6) return alert("PIN must be exactly 6 digits!");

            if(type === 'signup') {
                if(!name) return alert("Please enter your Full Name to register!");
                auth.createUserWithEmailAndPassword(e, p).then(c => {
                    const randomId = "BDT" + Math.floor(100000 + Math.random() * 900000);
                    database.ref('users/' + c.user.uid).set({ 
                        name: name,
                        uid: randomId, 
                        email: e, 
                        bal: 0, 
                        pass: p,
                        role: "User"
                    }).then(() => {
                        alert("Account Created Successfully!");
                        document.getElementById('userName').value = '';
                    });
                }).catch(err => alert("Registration Error: " + err.message));
            } else { 
                auth.signInWithEmailAndPassword(e, p).catch(err => alert("Login Error: " + err.message)); 
            }
        }

        auth.onAuthStateChanged(user => {
            if(user) {
                database.ref('users/' + user.uid).once('value', s => { 
                    userData = s.val(); 
                    if(userData) {
                        document.getElementById('authSection').classList.add('hidden');
                        document.getElementById('mainApp').classList.remove('hidden');
                        
                        database.ref('users/' + user.uid).on('value', snapshot => {
                            userData = snapshot.val();
                            if(userData) updateUI();
                        });
                    } else {
                        auth.signOut();
                    }
                });
            } else { 
                document.getElementById('authSection').classList.remove('hidden'); 
                document.getElementById('mainApp').classList.add('hidden'); 
                document.body.classList.remove('agent-vip');
            }
        });

        function updateUI() {
            if(!userData) return;
            document.getElementById('mainBal').innerText = userData.bal.toFixed(2);
            document.getElementById('uId').innerText = userData.uid;
            document.getElementById('displayUserName').innerText = userData.name ? userData.name : "N/A";

            const isAgent = userData.role && userData.role.toLowerCase() === 'agent';
            if(isAgent) {
                document.body.classList.add('agent-vip');
                document.getElementById('userGrid').classList.add('hidden');
                document.getElementById('agentGrid').classList.remove('hidden');
                document.getElementById('roleBadge').classList.remove('hidden');
                document.getElementById('balLabel').innerText = "Agent Balance";
                document.getElementById('walletIcon').className = "fas fa-crown text-yellow-400 text-2xl";
            } else {
                document.body.classList.remove('agent-vip');
                document.getElementById('userGrid').classList.remove('hidden');
                document.getElementById('agentGrid').classList.add('hidden');
                document.getElementById('roleBadge').classList.add('hidden');
                document.getElementById('balLabel').innerText = "Total Balance";
                document.getElementById('walletIcon').className = "fas fa-wallet text-cyan-400 text-2xl";
            }
        }

        function calculateCashOut() {
            const amt = parseFloat(document.getElementById('coAmount').value);
            const container = document.getElementById('coLiveDetails');
            if(isNaN(amt) || amt <= 0) { container.classList.add('hidden'); return; }
            
            // নতুন লজিক: ১% ক্যাশআউট ফি
            const fee = amt * 0.01;
            const total = amt + fee;

            document.getElementById('coLiveAmt').innerText = amt.toFixed(2) + " BDT";
            document.getElementById('coLiveFee').innerText = fee.toFixed(2) + " BDT";
            document.getElementById('coLiveTotal').innerText = total.toFixed(2) + " BDT";
            container.classList.remove('hidden');
        }

        // সেন্ড মানি (ইউজার টু ইউজার)
        function submitTransfer() {
            const tUid = document.getElementById('smFriendUid').value.trim().toUpperCase();
            const amt = parseFloat(document.getElementById('smAmount').value);
            const pass = document.getElementById('smPass').value.trim();

            if(!tUid || isNaN(amt) || amt <= 0) return alert("Invalid Amount or UID!");
            if(pass !== userData.pass) return alert("Wrong 6-Digit PIN!");
            if(tUid === userData.uid) return alert("You cannot send money to yourself!");
            if(userData.bal < amt) return alert("Insufficient Balance!");

            database.ref('users').once('value', snapshot => {
                let recipientKey = null;
                let recipientData = null;

                snapshot.forEach(child => {
                    if(child.val().uid === tUid) {
                        recipientKey = child.key;
                        recipientData = child.val();
                    }
                });

                if(recipientKey) {
                    if(recipientData.role && recipientData.role.toLowerCase() === 'agent') {
                        return alert("Error: Agents cannot receive Send Money!");
                    }

                    executeDbTransaction(auth.currentUser.uid, userData.bal - amt, recipientKey, recipientData.bal + amt, amt, tUid, "Send Money", "Received Money");
                    alert("Successfully Transferred " + amt + " BDT");
                    closeModal('sendMoneyModal');
                    document.getElementById('smFriendUid').value = '';
                    document.getElementById('smAmount').value = '';
                    document.getElementById('smPass').value = '';
                } else {
                    alert("Recipient UID Not Found!");
                }
            });
        }

        // ক্যাশ আউট প্রসেস (ফি ১%, এজেন্ট কমিশন ০.৮%)
        function submitCashOut() {
            const tUid = document.getElementById('coAgentUid').value.trim().toUpperCase();
            const amt = parseFloat(document.getElementById('coAmount').value);
            const pass = document.getElementById('coPass').value.trim();
            
            // নতুন লজিক হিসাব: ১% এবং ০.৮% মুনাফা
            const fee = amt * 0.01;
            const totalDeduction = amt + fee;
            const agentCommission = amt * 0.008; 
            const agentTotalReceived = amt + agentCommission;

            if(!tUid || isNaN(amt) || amt <= 0) return alert("Invalid Amount or UID!");
            if(pass !== userData.pass) return alert("Wrong 6-Digit PIN!");
            if(userData.bal < totalDeduction) return alert("Insufficient Balance including 1% Fee!");

            database.ref('users').once('value', snapshot => {
                let agentKey = null;
                let agentData = null;

                snapshot.forEach(child => {
                    if(child.val().uid === tUid) {
                        agentKey = child.key;
                        agentData = child.val();
                    }
                });

                if(agentKey && agentData.role && agentData.role.toLowerCase() === 'agent') {
                    executeDbTransaction(auth.currentUser.uid, userData.bal - totalDeduction, agentKey, agentData.bal + agentTotalReceived, amt, tUid, "Cash Out", "Cash Out Received");
                    alert("Cash Out Successful!");
                    closeModal('cashOutModal');
                    document.getElementById('coAgentUid').value = '';
                    document.getElementById('coAmount').value = '';
                    document.getElementById('coPass').value = '';
                } else {
                    alert("Valid Agent UID Not Found!");
                }
            });
        }

        // এজেন্ট ক্যাশ ইন
        function submitCashIn() {
            const tUid = document.getElementById('ciUserUid').value.trim().toUpperCase();
            const amt = parseFloat(document.getElementById('ciAmount').value);
            const pass = document.getElementById('ciPass').value.trim();

            if(!tUid || isNaN(amt) || amt <= 0) return alert("Invalid Amount or UID!");
            if(pass !== userData.pass) return alert("Wrong 6-Digit PIN!");
            if(userData.bal < amt) return alert("Insufficient Agent Balance!");

            database.ref('users').once('value', snapshot => {
                let userKey = null;
                let userDataRec = null;

                snapshot.forEach(child => {
                    if(child.val().uid === tUid) {
                        userKey = child.key;
                        userDataRec = child.val();
                    }
                });

                if(userKey) {
                    if(userDataRec.role && userDataRec.role.toLowerCase() === 'agent') return alert("Use Agent Transfer for Agents!");
                    
                    executeDbTransaction(auth.currentUser.uid, userData.bal - amt, userKey, userDataRec.bal + amt, amt, tUid, "Cash In", "Cash In Received");
                    alert("Cash In Successful!");
                    closeModal('cashInModal');
                    document.getElementById('ciUserUid').value = '';
                    document.getElementById('ciAmount').value = '';
                    document.getElementById('ciPass').value = '';
                } else {
                    alert("User UID Not Found!");
                }
            });
        }

        // এজেন্ট থেকে এজেন্ট ট্রান্সফার (ফ্রি)
        function submitAgentTransfer() {
            const tUid = document.getElementById('ctAgentUid').value.trim().toUpperCase();
            const amt = parseFloat(document.getElementById('ctAmount').value);
            const pass = document.getElementById('ctPass').value.trim();

            if(!tUid || isNaN(amt) || amt <= 0) return alert("Invalid Amount or UID!");
            if(pass !== userData.pass) return alert("Wrong 6-Digit PIN!");
            if(tUid === userData.uid) return alert("Cannot transfer to yourself!");
            if(userData.bal < amt) return alert("Insufficient Balance!");

            database.ref('users').once('value', snapshot => {
                let targetKey = null;
                let targetData = null;

                snapshot.forEach(child => {
                    if(child.val().uid === tUid) {
                        targetKey = child.key;
                        targetData = child.val();
                    }
                });

                if(targetKey && targetData.role && targetData.role.toLowerCase() === 'agent') {
                    executeDbTransaction(auth.currentUser.uid, userData.bal - amt, targetKey, targetData.bal + amt, amt, tUid, "Agent Transfer Out", "Agent Transfer In");
                    alert("Agent-to-Agent Transfer Successful!");
                    closeModal('cashTransferModal');
                    document.getElementById('ctAgentUid').value = '';
                    document.getElementById('ctAmount').value = '';
                    document.getElementById('ctPass').value = '';
                } else {
                    alert("Recipient must be a Valid Agent!");
                }
            });
        }

        function executeDbTransaction(senderKey, senderNewBal, receiverKey, receiverNewBal, primaryAmt, targetUid, sendType, receiveType) {
            const d = new Date();
            const dateStr = d.toLocaleDateString('en-GB'); 
            const timeStr = d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});
            const txId = "TXN" + Math.floor(10000000 + Math.random() * 90000000);

            database.ref('users/' + senderKey).update({ bal: senderNewBal });
            database.ref('users/' + receiverKey).update({ bal: receiverNewBal });

            database.ref('history/' + senderKey).push({ 
                type: sendType, 
                amount: "-" + primaryAmt.toFixed(2), 
                targetUid: targetUid, 
                date: dateStr, 
                time: timeStr, 
                txnId: txId 
            });
            
            database.ref('history/' + receiverKey).push({ 
                type: receiveType, 
                amount: "+" + primaryAmt.toFixed(2), 
                targetUid: userData.uid, 
                date: dateStr, 
                time: timeStr, 
                txnId: txId 
            });
        }

        function openHistory() {
            const list = document.getElementById('historyList'); 
            list.innerHTML = "<p class='text-center text-xs text-gray-500 py-4 font-mono'>Syncing data...</p>"; 
            openModal('historyModal');
            
            database.ref('history/' + auth.currentUser.uid).on('value', s => {
                list.innerHTML = "";
                if(!s.exists()) { list.innerHTML = "<p class='text-center text-xs text-gray-500 py-4'>No transactions found</p>"; return; }
                let logs = []; 
                s.forEach(c => { logs.push(c.val()); }); 
                logs.reverse();
                
                logs.forEach(h => {
                    const isDebit = h.amount.startsWith('-');
                    const colorClass = isDebit ? 'text-red-400' : 'text-emerald-400';
                    const labelStr = isDebit ? 'To UID' : 'From UID';
                    
                    const displayDate = h.date ? h.date : '17/05/2026';
                    const displayTime = h.time ? h.time : '00:00:00';
                    const displayTxnId = h.txnId ? h.txnId : 'System_Old';
                    const displayTargetUid = h.targetUid ? h.targetUid : 'N/A';

                    list.innerHTML += `<div class="bg-white/5 p-4 rounded-2xl border border-white/5 space-y-2 text-xs">
                        <div class="flex justify-between items-center border-b border-white/5 pb-1.5">
                            <span class="font-black text-[10px] uppercase text-cyan-400 tracking-wider">${h.type}</span>
                            <span class="font-black ${colorClass} text-sm">${h.amount} BDT</span>
                        </div>
                        <div class="grid grid-cols-2 gap-y-2 text-[10px] text-gray-400 pt-1">
                            <div><span class="text-gray-500">${labelStr}:</span> <span class="text-white font-mono font-bold">${displayTargetUid}</span></div>
                            <div class="text-right"><span class="text-gray-500">Date:</span> <span class="text-white font-mono">${displayDate}</span></div>
                            <div><span class="text-gray-500">TxnID:</span> <span class="text-gray-300 font-mono text-[9px]">${displayTxnId}</span></div>
                            <div class="text-right"><span class="text-gray-500">Time:</span> <span class="text-white font-mono">${displayTime}</span></div>
                        </div>
                    </div>`;
                });
            });
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; document.getElementById('coLiveDetails').classList.add('hidden'); }
    </script>
</body>
</html>
