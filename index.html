<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BDT Secure Wallet - Admin Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');
        body { font-family: 'Outfit', sans-serif; background: #050505; color: white; margin: 0; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; }
        .gradient-orange { background: linear-gradient(135deg, #f97316, #ea580c); }
        input, select { background: rgba(0,0,0,0.5) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; outline: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen pb-12">

    <!-- Navbar -->
    <div class="max-w-5xl mx-auto px-4 py-6 flex justify-between items-center border-b border-white/5">
        <h1 class="text-xl font-black text-orange-500 tracking-wider">BDT NODE <span class="text-white text-xs px-2 py-1 bg-white/10 rounded-md ml-2">ADMIN PANEL PRO</span></h1>
        <button onclick="location.reload()" class="text-xs bg-white/5 px-4 py-2 rounded-xl border border-white/10"><i class="fas fa-sync-alt mr-1"></i> Sync Server</button>
    </div>

    <div class="max-w-5xl mx-auto px-4 mt-8 grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <!-- Create Agent/User Section -->
        <div class="glass p-6 border-t-4 border-orange-500 h-fit">
            <h2 class="text-sm font-black uppercase tracking-wider text-orange-400 mb-4"><i class="fas fa-user-plus mr-2"></i> Register New Account</h2>
            <div class="space-y-3">
                <input type="text" id="newName" placeholder="Full Name" class="w-full p-3 rounded-xl text-xs">
                <input type="email" id="newEmail" placeholder="Email Address" class="w-full p-3 rounded-xl text-xs">
                <input type="password" id="newPass" placeholder="6-Digit PIN" maxlength="6" class="w-full p-3 rounded-xl text-xs text-center tracking-widest">
                <select id="userRole" class="w-full p-3 rounded-xl text-xs">
                    <option value="User">Regular User (BDT Prefix)</option>
                    <option value="Agent">VIP Agent (AGE Prefix)</option>
                </select>
                <button onclick="createAccountByAdmin()" class="w-full gradient-orange text-black font-black py-3 rounded-xl text-xs uppercase tracking-wider">Create Account</button>
            </div>
        </div>

        <!-- User Management Database -->
        <div class="glass p-6 lg:col-span-2 flex flex-col h-[600px]">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 mb-4">
                <h2 class="text-sm font-black uppercase tracking-wider text-cyan-400"><i class="fas fa-users mr-2"></i> Accounts Database (<span id="userCount">0</span>)</h2>
                <!-- লাইভ সার্চ বার -->
                <input type="text" id="searchBar" oninput="filterUsers()" placeholder="Search by UID, Name or Email..." class="w-full sm:w-64 p-2 px-3 rounded-xl text-xs">
            </div>
            
            <div id="userListContainer" class="space-y-3 overflow-y-auto pr-1 flex-1 no-scrollbar">
                <p class="text-center text-xs text-gray-500 py-8 font-mono">Fetching database records...</p>
            </div>
        </div>

    </div>

    <!-- Edit/Customize User Modal -->
    <div id="editModal" class="fixed inset-0 bg-black/95 z-50 hidden items-center justify-center p-4">
        <div class="glass p-6 w-full max-w-md border-t-4 border-cyan-500 max-h-[90vh] overflow-y-auto no-scrollbar">
            <h2 class="text-base font-black mb-2 text-cyan-400 uppercase"><i class="fas fa-user-cog mr-2"></i> Account Control Center</h2>
            <p class="text-[9px] text-gray-500 mb-4 font-mono">FB-KEY: <span id="editUserKey" class="text-gray-300">---</span></p>
            
            <div class="space-y-4 text-xs">
                <div>
                    <label class="text-gray-400 block mb-1 font-bold">Full Name</label>
                    <input type="text" id="editName" class="w-full p-3 rounded-xl font-medium">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-gray-400 block mb-1 font-bold">UID Code</label>
                        <input type="text" id="editUid" class="w-full p-3 rounded-xl uppercase font-mono">
                    </div>
                    <div>
                        <label class="text-gray-400 block mb-1 font-bold">6-Digit PIN</label>
                        <input type="text" id="editPass" maxlength="6" class="w-full p-3 rounded-xl text-center tracking-widest font-mono">
                    </div>
                </div>
                
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-gray-400 block mb-1 font-bold">Account Role</label>
                        <select id="editRole" class="w-full p-3 rounded-xl">
                            <option value="User">User</option>
                            <option value="Agent">Agent</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-gray-400 block mb-1 font-bold">Current Balance (BDT)</label>
                        <input type="number" id="editBal" class="w-full p-3 rounded-xl font-bold font-mono text-emerald-400">
                    </div>
                </div>

                <!-- কুইক ফান্ড একশন টুলস -->
                <div class="bg-white/5 p-4 rounded-xl border border-white/5">
                    <p class="text-[10px] font-black text-orange-400 uppercase tracking-wider mb-2"><i class="fas fa-bolt mr-1"></i> Quick Balance Modifier</p>
                    <div class="flex gap-2">
                        <input type="number" id="quickAmount" placeholder="Enter Amount" class="flex-1 p-2 rounded-lg text-center text-xs font-mono">
                        <button onclick="modifyBalance('add')" class="bg-emerald-500/20 border border-emerald-500/40 text-emerald-400 px-3 py-2 rounded-lg font-black uppercase text-[10px]">Add</button>
                        <button onclick="modifyBalance('cut')" class="bg-red-500/20 border border-red-500/40 text-red-400 px-3 py-2 rounded-lg font-black uppercase text-[10px]">Cut</button>
                    </div>
                </div>
            </div>

            <div class="flex gap-3 mt-6">
                <button onclick="closeEditModal()" class="flex-1 bg-white/5 py-3 rounded-xl text-xs font-bold uppercase border border-white/5">Cancel</button>
                <button onclick="saveUserData()" class="flex-1 bg-cyan-500 text-black font-black py-3 rounded-xl text-xs uppercase tracking-wider">Save Changes</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBIM8Rp8REYjdPHZegCYBF5ikW6Xdcqeg4",
            authDomain: "usdt-72320.firebaseapp.com",
            databaseURL: "https://usdt-72320-default-rtdb.firebaseio.com",
            projectId: "usdt-72320",
            storageBucket: "usdt-72320.firebasestorage.app",
            messagingSenderId: "7688156181",
            appId: "1:7688156181:web:85ae9e18021d149627ca1c",
            measurementId: "G-VRS9ZTF6ZY"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        
        const secondaryApp = firebase.initializeApp(firebaseConfig, "SecondaryAdmin");
        const secondaryAuth = secondaryApp.auth();

        let allUsersData = []; // স্থানীয় মেমোরিতে সার্চ ফিল্টারের জন্য ডাটা রাখার অ্যারে

        // ডাটাবেজ থেকে লাইভ ইউজার লিস্ট লোড করা
        function loadUsers() {
            database.ref('users').on('value', snapshot => {
                allUsersData = [];
                if(!snapshot.exists()) {
                    document.getElementById('userListContainer').innerHTML = "<p class='text-center text-xs text-gray-500 py-8'>No data found.</p>";
                    document.getElementById('userCount').innerText = "0";
                    return;
                }
                
                snapshot.forEach(child => {
                    let data = child.val();
                    data.key = child.key;
                    allUsersData.push(data);
                });
                
                renderUserList(allUsersData);
            });
        }

        // ইউজার লিস্ট স্ক্রিনে প্রিন্ট করা
        function renderUserList(users) {
            const container = document.getElementById('userListContainer');
            container.innerHTML = "";
            document.getElementById('userCount').innerText = users.length;

            if(users.length === 0) {
                container.innerHTML = "<p class='text-center text-xs text-gray-500 py-8'>No matching accounts found.</p>";
                return;
            }

            users.forEach(user => {
                const role = user.role ? user.role : 'User';
                const roleColor = role.toLowerCase() === 'agent' ? 'text-yellow-400 bg-yellow-500/10 border-yellow-500/20' : 'text-cyan-400 bg-cyan-500/10 border-cyan-500/20';
                const userName = user.name ? user.name : 'No Name';

                container.innerHTML += `
                    <div class="bg-white/5 p-4 rounded-xl border border-white/5 flex justify-between items-center gap-4 hover:bg-white/[0.07] transition duration-200">
                        <div class="space-y-1 text-xs">
                            <div class="flex items-center gap-2">
                                <span class="font-black text-white font-mono text-sm">${user.uid || 'N/A'}</span>
                                <span class="text-[9px] px-2 py-0.5 border rounded font-black uppercase ${roleColor}">${role}</span>
                            </div>
                            <p class="text-gray-300 font-bold text-[13px]">${userName}</p>
                            <p class="text-gray-500 text-[11px] font-mono">${user.email}</p>
                            <p class="text-[10px] text-gray-400 font-bold">PIN: <span class="text-cyan-400 font-mono tracking-wider">${user.pass || '------'}</span></p>
                        </div>
                        <div class="text-right flex flex-col items-end gap-2">
                            <span class="font-black text-emerald-400 text-base font-mono">${(user.bal || 0).toFixed(2)} <span class="text-[10px] text-white/40">BDT</span></span>
                            <button onclick="openEditModal('${user.key}', '${user.name || ''}', '${user.uid || ''}', ${user.bal || 0}, '${user.pass || ''}', '${role}')" class="bg-cyan-500 text-black text-[10px] uppercase font-black px-4 py-2 rounded-xl shadow-lg shadow-cyan-500/10 hover:opacity-90 active:scale-95 transition">Manage</button>
                        </div>
                    </div>
                `;
            });
        }

        // লাইভ সার্চ ইঞ্জিন
        function filterUsers() {
            const query = document.getElementById('searchBar').value.trim().toLowerCase();
            if(!query) {
                renderUserList(allUsersData);
                return;
            }
            
            const filtered = allUsersData.filter(u => {
                const uid = u.uid ? u.uid.toLowerCase() : '';
                const name = u.name ? u.name.toLowerCase() : '';
                const email = u.email ? u.email.toLowerCase() : '';
                return uid.includes(query) || name.includes(query) || email.includes(query);
            });
            
            renderUserList(filtered);
        }

        // নতুন ইউজার/এজেন্ট একাউন্ট তৈরি (নাম সহ)
        function createAccountByAdmin() {
            const name = document.getElementById('newName').value.trim();
            const email = document.getElementById('newEmail').value.trim().toLowerCase();
            const pass = document.getElementById('newPass').value.trim();
            const role = document.getElementById('userRole').value;

            if(!name || !email || !pass) return alert("Please fill all information fields!");
            if(pass.length !== 6) return alert("PIN must be exactly 6 digits!");

            const prefix = role === 'Agent' ? "AGE" : "BDT";
            const randomId = prefix + Math.floor(100000 + Math.random() * 900000);

            secondaryAuth.createUserWithEmailAndPassword(email, pass).then(c => {
                database.ref('users/' + c.user.uid).set({ 
                    name: name,
                    uid: randomId, 
                    email: email, 
                    bal: 0, 
                    pass: pass,
                    role: role
                }).then(() => {
                    alert(`Successfully created ${role} Account!\nName: ${name}\nUID: ${randomId}`);
                    document.getElementById('newName').value = '';
                    document.getElementById('newEmail').value = '';
                    document.getElementById('newPass').value = '';
                    secondaryAuth.signOut();
                });
            }).catch(err => alert("Registration Error: " + err.message));
        }

        // কন্ট্রোল মডেল প্যানেল ওপেন
        function openEditModal(key, name, uid, bal, pass, role) {
            document.getElementById('editUserKey').innerText = key;
            document.getElementById('editName').value = name;
            document.getElementById('editUid').value = uid;
            document.getElementById('editBal').value = bal;
            document.getElementById('editPass').value = pass;
            document.getElementById('editRole').value = role;
            document.getElementById('quickAmount').value = '';
            document.getElementById('editModal').style.display = 'flex';
        }

        function closeEditModal() {
            document.getElementById('editModal').style.display = 'none';
        }

        // শর্টকাট উপায়ে ব্যালেন্স অ্যাড বা কাট করা
        function modifyBalance(action) {
            const currentBalInput = document.getElementById('editBal');
            const amountInput = document.getElementById('quickAmount');
            const amount = parseFloat(amountInput.value);

            if(isNaN(amount) || amount <= 0) return alert("Please type a valid amount!");
            
            let currentBal = parseFloat(currentBalInput.value);
            if(action === 'add') {
                currentBal += amount;
            } else {
                if(currentBal < amount) return alert("Insufficient balance to deduct!");
                currentBal -= amount;
            }

            currentBalInput.value = currentBal;
            amountInput.value = '';
            alert(`Balance modified successfully. Remember to click "Save Changes" to upload.`);
        }

        // সকল পরিবর্তন ডাটাবেজে সেভ করা
        function saveUserData() {
            const key = document.getElementById('editUserKey').innerText;
            const updatedName = document.getElementById('editName').value.trim();
            const updatedUid = document.getElementById('editUid').value.trim().toUpperCase();
            const updatedBal = parseFloat(document.getElementById('editBal').value);
            const updatedPass = document.getElementById('editPass').value.trim();
            const updatedRole = document.getElementById('editRole').value;

            if(!updatedName || !updatedUid || isNaN(updatedBal) || !updatedPass) return alert("No inputs can be blank!");
            if(updatedPass.length !== 6) return alert("PIN must be exactly 6 digits!");

            database.ref('users/' + key).update({
                name: updatedName,
                uid: updatedUid,
                bal: updatedBal,
                pass: updatedPass,
                role: updatedRole
            }).then(() => {
                alert("Account records modified successfully!");
                closeEditModal();
            }).catch(err => alert("Server Error: " + err.message));
        }

        // প্রথমবার পেজ লোড
        loadUsers();
    </script>
</body>
</html>
