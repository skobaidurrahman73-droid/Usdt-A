<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BDT Secure Wallet - Admin Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');
        body { font-family: 'Outfit', sans-serif; background: #050505; color: white; margin: 0; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; }
        .gradient-orange { background: linear-gradient(135deg, #f97316, #ea580c); }
        input, select { background: rgba(0,0,0,0.5) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; outline: none; }
    </style>
</head>
<body class="min-h-screen pb-12">

    <!-- Navbar -->
    <div class="max-w-4xl mx-auto px-4 py-6 flex justify-between items-center border-b border-white/5">
        <h1 class="text-xl font-black text-orange-500 tracking-wider">BDT NODE <span class="text-white text-xs px-2 py-1 bg-white/10 rounded-md ml-2">ADMIN</span></h1>
        <button onclick="location.reload()" class="text-xs bg-white/5 px-4 py-2 rounded-xl border border-white/10"><i class="fas fa-sync-alt mr-1"></i> Refresh</button>
    </div>

    <div class="max-w-4xl mx-auto px-4 mt-8 grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <!-- Create Agent Section -->
        <div class="glass p-6 border-t-4 border-orange-500 col-span-1">
            <h2 class="text-sm font-black uppercase tracking-wider text-orange-400 mb-4"><i class="fas fa-user-plus mr-2"></i> Create Agent/User</h2>
            <div class="space-y-3">
                <input type="email" id="newEmail" placeholder="Email Address" class="w-full p-3 rounded-xl text-xs">
                <input type="password" id="newPass" placeholder="6-Digit PIN" maxlength="6" class="w-full p-3 rounded-xl text-xs text-center tracking-widest">
                <select id="userRole" class="w-full p-3 rounded-xl text-xs">
                    <option value="Agent">Agent Account</option>
                    <option value="User">Regular User</option>
                </select>
                <button onclick="createAccountByAdmin()" class="w-full gradient-orange text-black font-black py-3 rounded-xl text-xs uppercase tracking-wider">Create Account</button>
            </div>
        </div>

        <!-- User Management List -->
        <div class="glass p-6 col-span-1 md:col-span-2 flex flex-col h-[500px]">
            <h2 class="text-sm font-black uppercase tracking-wider text-cyan-400 mb-4"><i class="fas fa-users mr-2"></i> Users & Agents Database (<span id="userCount">0</span>)</h2>
            <div id="userListContainer" class="space-y-3 overflow-y-auto pr-1 flex-1">
                <p class="text-center text-xs text-gray-500 py-8">Loading database...</p>
            </div>
        </div>

    </div>

    <!-- Edit User Modal -->
    <div id="editModal" class="fixed inset-0 bg-black/90 z-50 hidden items-center justify-center p-4">
        <div class="glass p-6 w-full max-w-sm border-t-4 border-cyan-500">
            <h2 class="text-base font-black mb-4 text-cyan-400 uppercase"><i class="fas fa-edit mr-2"></i> Edit Account Data</h2>
            <p class="text-[10px] text-gray-400 mb-4">Firebase Key: <span id="editUserKey" class="text-white font-mono">---</span></p>
            
            <div class="space-y-3 text-xs">
                <div>
                    <label class="text-gray-400 block mb-1">UID Code</label>
                    <input type="text" id="editUid" class="w-full p-3 rounded-xl uppercase font-mono">
                </div>
                <div>
                    <label class="text-gray-400 block mb-1">Available Balance (BDT)</label>
                    <input type="number" id="editBal" class="w-full p-3 rounded-xl font-bold">
                </div>
                <div>
                    <label class="text-gray-400 block mb-1">6-Digit PIN</label>
                    <input type="text" id="editPass" maxlength="6" class="w-full p-3 rounded-xl text-center tracking-widest">
                </div>
                <div>
                    <label class="text-gray-400 block mb-1">Account Status/Tag</label>
                    <input type="text" id="editRole" placeholder="e.g., Agent, User, Premium" class="w-full p-3 rounded-xl">
                </div>
            </div>

            <div class="flex gap-3 mt-6">
                <button onclick="closeEditModal()" class="flex-1 bg-white/5 py-3 rounded-xl text-xs font-bold uppercase">Cancel</button>
                <button onclick="saveUserData()" class="flex-1 bg-cyan-500 text-black font-black py-3 rounded-xl text-xs uppercase">Save Changes</button>
            </div>
        </div>
    </div>

    <script>
        // আপনার ফায়ারবেস কনফিগারেশন
        const firebaseConfig = {
            apiKey: "AIzaSyBIM8Rp8REYjdPHZegCYBF5ikW6Xdcqeg4",
            authDomain: "usdt-72320.firebaseapp.com",
            databaseURL: "https://usdt-72320-default-rtdb.firebaseio.com",
            projectId: "usdt-72320",
            storageBucket: "usdt-72320.firebasestorage.app",
            messagingSenderId: "7688156181",
            appId: "1:7688156181:web:85ae9e18021d149627ca1c",
            measurementId: "G-VRS9ZTF6ZY"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        
        // ফায়ারবেস সেকেন্ডারি অ্যাপ তৈরি করা হয়েছে যাতে মেইন এডমিন সেশন নষ্ট না হয়ে ব্যাকগ্রাউন্ডে অ্যাকাউন্ট তৈরি করা যায়
        const secondaryApp = firebase.initializeApp(firebaseConfig, "Secondary");
        const secondaryAuth = secondaryApp.auth();

        // ডেটাবেজ থেকে সকল ইউজার লোড করা
        function loadUsers() {
            database.ref('users').on('value', snapshot => {
                const container = document.getElementById('userListContainer');
                container.innerHTML = "";
                
                if(!snapshot.exists()) {
                    container.innerHTML = "<p class='text-center text-xs text-gray-500 py-8'>No accounts found.</p>";
                    document.getElementById('userCount').innerText = "0";
                    return;
                }

                let count = 0;
                snapshot.forEach(child => {
                    count++;
                    const user = child.val();
                    const key = child.key;
                    const role = user.role ? user.role : 'User';
                    const roleColor = role.toLowerCase() === 'agent' ? 'text-orange-400 bg-orange-500/10' : 'text-cyan-400 bg-cyan-500/10';

                    container.innerHTML += `
                        <div class="bg-white/5 p-4 rounded-xl border border-white/5 flex justify-between items-center gap-4">
                            <div class="space-y-1 text-xs">
                                <div class="flex items-center gap-2">
                                    <span class="font-black text-white font-mono">${user.uid || 'N/A'}</span>
                                    <span class="text-[9px] px-2 py-0.5 rounded font-bold uppercase ${roleColor}">${role}</span>
                                </div>
                                <p class="text-gray-400 text-[11px] font-mono">${user.email}</p>
                                <p class="text-[10px] text-gray-500">PIN: <span class="text-gray-300 font-mono">${user.pass || '------'}</span></p>
                            </div>
                            <div class="text-right flex flex-col items-end gap-2">
                                <span class="font-black text-emerald-400 text-sm font-mono">${(user.bal || 0).toFixed(2)} BDT</span>
                                <button onclick="openEditModal('${key}', '${user.uid || ''}', ${user.bal || 0}, '${user.pass || ''}', '${role}')" class="bg-white/5 border border-white/10 text-[10px] uppercase font-bold px-3 py-1.5 rounded-lg hover:bg-white/10 transition">Edit</button>
                            </div>
                        </div>
                    `;
                });
                document.getElementById('userCount').innerText = count;
            });
        }

        // নতুন এজেন্ট/ইউজার অ্যাকাউন্ট তৈরি
        function createAccountByAdmin() {
            const email = document.getElementById('newEmail').value.trim().toLowerCase();
            const pass = document.getElementById('newPass').value.trim();
            const role = document.getElementById('userRole').value;

            if(!email || !pass) return alert("Please fill all creation fields!");
            if(pass.length !== 6) return alert("PIN must be exactly 6 digits!");

            const prefix = role === 'Agent' ? "AGE" : "BDT";
            const randomId = prefix + Math.floor(100000 + Math.random() * 900000);

            secondaryAuth.createUserWithEmailAndPassword(email, pass).then(c => {
                database.ref('users/' + c.user.uid).set({ 
                    uid: randomId, 
                    email: email, 
                    bal: 0, 
                    pass: pass,
                    role: role
                }).then(() => {
                    alert(`${role} Account successfully created with UID: ${randomId}`);
                    document.getElementById('newEmail').value = '';
                    document.getElementById('newPass').value = '';
                    secondaryAuth.signOut(); // ব্যাকগ্রাউন্ড সেশন ক্লিয়ার
                });
            }).catch(err => alert("Creation Error: " + err.message));
        }

        // এডিট মডেল ওপেন করা
        function openEditModal(key, uid, bal, pass, role) {
            document.getElementById('editUserKey').innerText = key;
            document.getElementById('editUid').value = uid;
            document.getElementById('editBal').value = bal;
            document.getElementById('editPass').value = pass;
            document.getElementById('editRole').value = role === 'undefined' ? 'User' : role;
            document.getElementById('editModal').style.display = 'flex';
        }

        function closeEditModal() {
            document.getElementById('editModal').style.display = 'none';
        }

        // পরিমার্জিত ডেটা সেভ করা
        function saveUserData() {
            const key = document.getElementById('editUserKey').innerText;
            const updatedUid = document.getElementById('editUid').value.trim().toUpperCase();
            const updatedBal = parseFloat(document.getElementById('editBal').value);
            const updatedPass = document.getElementById('editPass').value.trim();
            const updatedRole = document.getElementById('editRole').value.trim();

            if(!updatedUid || isNaN(updatedBal) || !updatedPass) return alert("Fields cannot be empty!");
            if(updatedPass.length !== 6) return alert("PIN must be exactly 6 digits!");

            database.ref('users/' + key).update({
                uid: updatedUid,
                bal: updatedBal,
                pass: updatedPass,
                role: updatedRole
            }).then(() => {
                alert("Account customized successfully!");
                closeEditModal();
            }).catch(err => alert("Update Error: " + err.message));
        }

        // ইনিশিয়াল লোড
        loadUsers();
    </script>
</body>
</html>
